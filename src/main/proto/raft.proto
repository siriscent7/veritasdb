syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.veritasdb.proto";
option java_outer_classname = "RaftProto";

package raft;

service RaftService {
  rpc RequestVote (VoteRequest) returns (VoteReply);
  rpc AppendEntries (AppendRequest) returns (AppendReply);
}

message VoteRequest {
  int64 term = 1;
  int32 candidateId = 2;
  int32 lastLogIndex = 3;
  int64 lastLogTerm = 4;
}

message VoteReply {
  int64 term = 1;
  bool voteGranted = 2;
}

message LogEntryProto {
  int64 term = 1;
  int32 index = 2;
  string command = 3;
}

message AppendRequest {
  int64 term = 1;
  int32 leaderId = 2;
  int32 prevLogIndex = 3;
  int64 prevLogTerm = 4;
  repeated LogEntryProto entries = 5;
  int32 leaderCommit = 6;
}

message AppendReply {
  int64 term = 1;
  bool success = 2;
  int32 matchIndex = 3;
}
